[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.gd", "php83Extensions.pdo_mysql", "php83Extensions.bcmath", "nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist", "npm install"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
