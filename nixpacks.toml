[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "php82Extensions.gd", "php82Extensions.pdo_mysql", "php82Extensions.bcmath", "php82Extensions.intl", "php82Extensions.zip", "nodejs_20"]

[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist", "npm install"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "mkdir -p database && touch database/database.sqlite && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
