[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs_20"]

[variables]
NIXPACKS_PHP_EXT_INSTALL = "gd, bcmath, pdo_mysql, intl, zip"

[phases.install]
dependsOn = ["setup"]
cmds = ["composer install --no-dev --no-interaction --prefer-dist --ignore-platform-reqs", "npm install"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
